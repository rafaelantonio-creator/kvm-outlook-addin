<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Convite Assertivo - KVM</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script src="taskpane.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f3f4f6;
      color: #333;
      padding: 16px;
      min-height: 100vh;
    }
    .header {
      background: #0078D4;
      color: white;
      padding: 14px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .header h2 { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
    .header p { font-size: 11px; opacity: 0.85; }
    .card {
      background: white;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 12px;
      border: 1px solid #e0e0e0;
    }
    .card h4 {
      font-size: 12px;
      color: #0078D4;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .card p { font-size: 12px; color: #555; line-height: 1.5; }
    button {
      background: #0078D4;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.2s;
    }
    button:hover { background: #005a9e; }
    button:active { background: #004578; }
    #status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      padding: 8px;
      border-radius: 4px;
      display: none;
    }
    .footer { margin-top: 16px; text-align: center; font-size: 10px; color: #aaa; }
  </style>
</head>
<body>
  <div class="header">
    <h2>📅 Convite Assertivo</h2>
    <p>Padrão corporativo KVM Tecnologia</p>
  </div>
  <div class="card">
    <h4>O que será inserido</h4>
    <p>
      🎯 Objetivo da reunião<br>
      ✅ Resultado esperado<br>
      👥 Participantes e papéis<br>
      📋 Pauta com tópicos<br>
      ⏱ Duração estimada
    </p>
  </div>
  <button id="btnAplicar">▶ Aplicar Template no Convite</button>
  <div id="status"></div>
  <div class="footer">KVM Tecnologia © 2026</div>
</body>
</html>
